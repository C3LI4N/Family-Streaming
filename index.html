<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Family Streaming</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color:white;
transition:0.3s;
}

h1{
margin-top:40px;
font-size:40px;
}

.search{
margin:20px;
}

input{
padding:12px;
width:260px;
border-radius:20px;
border:none;
outline:none;
font-size:16px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
width:220px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
text-align:center;
margin-bottom:20px;
}

.link{
display:block;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
margin:8px 0;
transition:0.2s;
text-align:center;
}

.link:hover{
background:rgba(255,255,255,0.35);
}

.mode{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.dark{
background:#111;
}

.dark .card{
background:#1f1f1f;
}

.dark .link{
background:#333;
}

</style>

</head>

<body>

<button class="mode" onclick="toggleMode()">🌙 Mode sombre</button>

<h1>Family Hub</h1>

<div class="search">
<input type="text" id="searchInput" placeholder="🔎 Rechercher un site...">
</div>

<div class="container">

<div class="card">
<h2>Purstream</h2>
<a class="link" href="https://purstream.cc" target="_blank" rel="noopener noreferrer">
<i class="fa-solid fa-film"></i> Accueil
</a>
</div>

<div class="card">
<h2>Cinepulse</h2>
<a class="link" href="https://cinepulse.co" target="_blank" rel="noopener noreferrer">
<i class="fa-solid fa-film"></i> Accueil
</a>
</div>

<div class="card">
<h2>Hiboux+</h2>
<a class="link" href="https://hiboux.click" target="_blank" rel="noopener noreferrer">
<i class="fa-solid fa-film"></i> Accueil
</a>
</div>

<div class="card">
<h2>Movix</h2>
<a class="link" href="https://movix.blog" target="_blank" rel="noopener noreferrer">
<i class="fa-solid fa-film"></i> Accueil
</a>
</div>

</div>

<script>

/* recherche */

const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function(){

let filter = searchInput.value.toLowerCase();

cards.forEach(card => {

let text = card.textContent.toLowerCase();

if(text.includes(filter)){
card.style.display="block";
}
else{
card.style.display="none";
}

});

});

/* mode sombre avec mémoire */

function toggleMode(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark");
}
else{
localStorage.setItem("theme","light");
}

}

/* charger le thème sauvegardé */

window.onload = function(){

let theme = localStorage.getItem("theme");

if(theme === "dark"){
document.body.classList.add("dark");
}

};

</script>

</body>
</html>

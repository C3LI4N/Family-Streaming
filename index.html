<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Hub Streaming</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  h1 {
    text-align: center;
    color: #fff;
    margin-top: 20px;
    text-shadow: 1px 1px 5px #000;
  }

  .hub-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .site-card {
    position: relative;
    background-color: #222;
    color: #fff;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .site-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
  }

  .site-card .logo {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    object-fit: contain;
    position: absolute;
    top: 15px;
    right: 15px;
    background: #fff;
    padding: 5px;
  }

  .site-card .status {
    font-weight: bold;
  }

  .site-card .tooltip {
    visibility: hidden;
    background-color: rgba(0,0,0,0.9);
    color: #fff;
    text-align: left;
    border-radius: 6px;
    padding: 10px;
    position: absolute;
    z-index: 1;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .site-card:hover .tooltip {
    visibility: visible;
  }

  /* Couleurs selon statut */
  .status-online { border-left: 5px solid #4caf50; }
  .status-warning { border-left: 5px solid #ff9800; }
  .status-offline { border-left: 5px solid #f44336; }

</style>
</head>
<body>
<h1>Mini Hub Streaming</h1>
<div class="hub-container" id="hubContainer">
  <!-- Les cartes seront générées par JS -->
</div>

<script>
  const sites = [
    {
      name: "CinePulse",
      logo: "cinepulse.png",
      status: "online",
      reliability: 4,
      complexity: "Moyenne",
      type: "Films, Séries",
      lastChecked: "13/03/2026"
    },
    {
      name: "StreamZone",
      logo: "streamzone.png",
      status: "warning",
      reliability: 3,
      complexity: "Élevée",
      type: "Films",
      lastChecked: "12/03/2026"
    },
    {
      name: "MovieHub",
      logo: "moviehub.png",
      status: "offline",
      reliability: 2,
      complexity: "Faible",
      type: "Séries",
      lastChecked: "10/03/2026"
    }
  ];

  const hubContainer = document.getElementById('hubContainer');

  sites.forEach(site => {
    const card = document.createElement('div');
    card.className = `site-card status-${site.status}`;

    card.innerHTML = `
      <img src="${site.logo}" alt="${site.name}" class="logo">
      <h3>${site.name}</h3>
      <p class="status">Statut: ${site.status === 'online' ? '✅ En ligne' : site.status === 'warning' ? '⚠️ Accès limité' : '❌ Hors ligne'}</p>
      <div class="tooltip">
        Fiabilité: ${'★'.repeat(site.reliability)}<br>
        Complexité: ${site.complexity}<br>
        Contenu: ${site.type}<br>
        Dernière vérif: ${site.lastChecked}
      </div>
    `;
    hubContainer.appendChild(card);
  });
</script>
</body>
</html>
